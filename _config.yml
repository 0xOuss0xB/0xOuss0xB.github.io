# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: en
timezone: Europe/Paris

title: 0xOuss0xB
tagline: Offensive Security • HTB Writeups • CVE Research

description: >-
  Blog offensif — writeups HackTheBox, analyses de CVE, pentest web et Active Directory.
  Notes de terrain d'un pentester.

url: "https://0xOuss0xB.github.io"

github:
  username: 0xOuss0xB

twitter:
  username: # laisse vide si pas de Twitter

social:
  name: 0xOuss0xB
  email: # ton email si tu veux
  fediverse_handle:
  links:
    - https://github.com/0xOuss0xB

# Site Verification Settings
webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

# Web Analytics Settings
analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

pageviews:
  provider:

theme_mode: dark

cdn:

avatar: 

social_preview_image:

toc: true

comments:
  provider: giscus
  giscus:
    repo: 0xOuss0xB/0xOuss0xB.github.io
    repo_id:
    category:
    category_id:
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: fr
    reactions_enabled: 1

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

baseurl: ""

# --- Ne pas modifier en dessous ---

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
